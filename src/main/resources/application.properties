spring.application.name=doc-generator
server.port=8080

# Без Docker: http://localhost:11434 | В контейнері: задається через OLLAMA_BASE_URL
ollama.base.url=${OLLAMA_BASE_URL:http://localhost:11434}

app.templates.path=src/main/resources/templates/

logging.level.dev.langchain4j=WARN
logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.pdfbox=ERROR

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# H2 файлова БД — зберігає історію між перезапусками
spring.datasource.url=jdbc:h2:file:./data/docgen;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
