# Основні налаштування програми
#spring.application.name=doc-generator
#server.port=8080
# OpenAI API Key (твій секретний ключ)
#ollama.base.url=http://localhost:11434
#openai.api.key=sk-ТВІЙ_КЛЮЧ_ТУТ
# Налаштування моделі (можна змінювати за потреби)
# gpt-4o — найрозумніша, gpt-3.5-turbo — найдешевша
#openai.model.name=gpt-4o
#openai.timeout=60s
# Шляхи до шаблонів документів (де лежать твої .docx заготовки)
#app.templates.path=src/main/resources/templates/
# Налаштування логування (щоб бачити запити в консолі VS Code)
#logging.level.dev.langchain4j=DEBUG

spring.application.name=doc-generator
server.port=8080

# Без Docker: http://localhost:11434 | В контейнері: задається через OLLAMA_BASE_URL
ollama.base.url=${OLLAMA_BASE_URL:http://localhost:11434}

app.templates.path=src/main/resources/templates/

logging.level.dev.langchain4j=WARN

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# H2 файлова БД — зберігає історію між перезапусками
spring.datasource.url=jdbc:h2:file:./data/docgen;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false